services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dcms
      POSTGRES_PASSWORD: dcms
      POSTGRES_DB: dcms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcms -d dcms"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...waiting for minio' && sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/dcms-attachments;
      /usr/bin/mc anonymous set none local/dcms-attachments;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    env_file:
      - apps/api/.env
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages

  web:
      build:
        context: .
        dockerfile: apps/web/Dockerfile
        target: build        # stop at the build stage, skip nginx
      environment:
        - VITE_API_BASE_URL=http://localhost:3001
      ports:
        - "5173:5173"
      command: npm run dev -- --host 0.0.0.0 --port 5173
      volumes:
        # Bind-mount live source for HMR; the two anonymous volumes below MASK
        # the host node_modules so the container uses its OWN image-installed
        # deps (the critical guard against the duplicate-React trap on Windows).
        - ./apps/web:/app/apps/web
        - ./packages:/app/packages
        - /app/node_modules
        - /app/apps/web/node_modules
      depends_on:
        - api

volumes:
  pgdata:
  miniodata:
